name: GET 6h capture

on:
  push:
    branches: [main]
    paths:
      - 'main1.py'
      - '__CAP/**'
      - '__COMMON/**'
      - 'requirements.txt'
      - 'Dockerfile'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: get-6h
  cancel-in-progress: false

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT3 }}

      - name: Run capture
        run: |
          docker run --rm \
            -v "$(pwd)":/app -w /app \
            ghcr.io/${{ github.repository_owner }}/venv_get:latest \
            python main1.py
